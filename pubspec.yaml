name: network_call
description: "Network Caller — example app demonstrating the network_caller packages."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dart workspace — resolves dependencies across all packages
workspace:
  - packages/network_caller_core
  - packages/network_caller_http

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  adapti_flow: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
